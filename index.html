<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>ORCHIDAS Result Dashboard</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
:root {
    --bg: #f3f4f6;
    --panel: #ffffff;
    --text: #111827;
    --muted: #6b7280;
    --blue: #2563eb;
    --border: #e5e7eb;
}
* { box-sizing: border-box; }
body { margin: 0; font-family: Arial, Helvetica, sans-serif; background: var(--bg); color: var(--text); }
header { background: #111827; color: white; padding: 16px 24px; }
header h1 { margin: 0; font-size: 24px; }
header p { margin: 6px 0 0; color: #d1d5db; font-size: 14px; }
.layout { display: grid; grid-template-columns: 440px 1fr; height: calc(100vh - 75px); }
.left { display: flex; flex-direction: column; border-right: 1px solid var(--border); background: var(--panel); }
#map { height: 42%; min-height: 300px; border-bottom: 1px solid var(--border); }
.site-list { padding: 16px; overflow: auto; }
.site-list h3 { margin-bottom: 8px; }
.site-button {
    display: block; width: 100%; text-align: left; padding: 10px 12px; margin-bottom: 8px;
    border: 1px solid var(--border); border-radius: 10px; background: white; cursor: pointer; font-weight: bold;
}
.site-button:hover { border-color: var(--blue); }
.site-button.active { background: #eff6ff; border-color: var(--blue); color: var(--blue); }
.extra-button.active { background: #fef3c7; border-color: #f59e0b; color: #92400e; }
.right { overflow: auto; padding: 20px; }
.panel { background: var(--panel); border: 1px solid var(--border); border-radius: 16px; padding: 18px; box-shadow: 0 1px 8px rgba(0,0,0,0.06); }
.site-title { font-size: 24px; font-weight: bold; margin-bottom: 4px; }
.site-subtitle { color: var(--muted); margin-bottom: 16px; }
.tabs { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 18px; }
.tab { border: 1px solid var(--border); background: #f9fafb; padding: 8px 12px; border-radius: 10px; cursor: pointer; font-weight: bold; }
.tab.active { background: var(--blue); color: white; border-color: var(--blue); }
.search-row { display: flex; gap: 10px; margin-bottom: 18px; }
.search-row input { flex: 1; padding: 10px 12px; border: 1px solid var(--border); border-radius: 10px; font-size: 14px; }
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(430px, 1fr)); gap: 18px; }
.card { border: 1px solid var(--border); background: white; border-radius: 14px; padding: 10px; }
.card img { width: 100%; border-radius: 10px; cursor: zoom-in; display: block; }
.caption { margin-top: 8px; font-size: 13px; color: var(--muted); word-break: break-all; }
.empty { padding: 18px; background: #fff7ed; border: 1px solid #fed7aa; color: #9a3412; border-radius: 12px; font-weight: bold; }
.modal { display: none; position: fixed; z-index: 9999; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.82); align-items: center; justify-content: center; padding: 30px; }
.modal img { max-width: 95vw; max-height: 90vh; background: white; border-radius: 10px; }
.modal.show { display: flex; }
.close { position: fixed; top: 18px; right: 26px; color: white; font-size: 34px; font-weight: bold; cursor: pointer; }
hr { border: none; border-top: 1px solid var(--border); margin: 18px 0; }
@media (max-width: 1000px) {
    .layout { grid-template-columns: 1fr; height: auto; }
    #map { height: 420px; }
    .grid { grid-template-columns: 1fr; }
}
</style>
</head>

<body>
<header>
    <h1>ORCHIDAS Result Dashboard</h1>
    <p>Interactive site map with prior plots and extra optimization outputs generated from ORCHIDAS NetCDF files.</p>
</header>

<div class="layout">
    <div class="left">
        <div id="map"></div>
        <div class="site-list">
            <h3>Sites</h3>
            <div id="siteButtons"></div>
            <hr>
            <h3>Extra optimizations</h3>
            <div id="extraButtons"></div>
        </div>
    </div>

    <div class="right">
        <div class="panel">
            <div class="site-title" id="siteTitle">Select a site</div>
            <div class="site-subtitle" id="siteSubtitle"></div>
            <div class="tabs" id="tabs"></div>
            <div class="search-row">
                <input id="searchBox" placeholder="Filter plots, e.g. gppt, fluxlat, neet, lai, agb..." oninput="renderPlots()">
            </div>
            <div id="plots"></div>
        </div>
    </div>
</div>

<div class="modal" id="modal" onclick="closeModal()">
    <span class="close">&times;</span>
    <img id="modalImg">
</div>

const PRIOR_CATEGORIES = [
  {
    "key": "ensemble_LHF_GPP",
    "label": "Ensemble LHF/GPP"
  },
  {
    "key": "ensemble_LAIAGB",
    "label": "Ensemble LAI/AGB"
  },
  {
    "key": "PRIOR_orig",
    "label": "PRIOR_orig LHF/GPP"
  },
  {
    "key": "PRIOR_optY",
    "label": "PRIOR_optY LHF/GPP"
  },
  {
    "key": "PRIOR_optN",
    "label": "PRIOR_optN LHF/GPP"
  },
  {
    "key": "PRIOR_orig_LAIAGB",
    "label": "PRIOR_orig LAI/AGB"
  },
  {
    "key": "PRIOR_optY_LAIAGB",
    "label": "PRIOR_optY LAI/AGB"
  },
  {
    "key": "PRIOR_optN_LAIAGB",
    "label": "PRIOR_optN LAI/AGB"
  }
];

let currentMode = "sites";
let currentItem = Object.keys(DATA.sites)[0];
let currentCategory = PRIOR_CATEGORIES[0].key;

const map = L.map("map").setView([47.2, 4.5], 5);

L.tileLayer("https://tile.openstreetmap.org/{z}/{x}/{y}.png", {
    maxZoom: 19,
    attribution: '&copy; OpenStreetMap contributors'
}).addTo(map);

const markers = {};

function initMap() {
    for (const [site, meta] of Object.entries(DATA.sites)) {
        const marker = L.marker([meta.lat, meta.lon]).addTo(map);
        marker.bindPopup(`<b>${site}</b><br>${meta.folder}<br><button onclick="selectPriorSite('${site}')">Open plots</button>`);
        marker.on("click", () => selectPriorSite(site));
        markers[site] = marker;
    }
}

function initButtons() {
    const siteBox = document.getElementById("siteButtons");
    siteBox.innerHTML = "";

    for (const site of Object.keys(DATA.sites)) {
        const btn = document.createElement("button");
        btn.className = "site-button";
        btn.id = "btn-sites-" + site;
        btn.innerText = site;
        btn.onclick = () => selectPriorSite(site);
        siteBox.appendChild(btn);
    }

    const extraBox = document.getElementById("extraButtons");
    extraBox.innerHTML = "";

    for (const opt of Object.keys(DATA.extra_opts)) {
        const btn = document.createElement("button");
        btn.className = "site-button extra-button";
        btn.id = "btn-extra-" + opt;
        btn.innerText = opt;
        btn.onclick = () => selectExtraOpt(opt);
        extraBox.appendChild(btn);
    }
}

function selectPriorSite(site) {
    currentMode = "sites";
    currentItem = site;
    currentCategory = PRIOR_CATEGORIES[0].key;
    document.getElementById("searchBox").value = "";

    const meta = DATA.sites[site];
    map.setView([meta.lat, meta.lon], 8);
    if (markers[site]) markers[site].openPopup();

    render();
}

function selectExtraOpt(opt) {
    currentMode = "extra_opts";
    currentItem = opt;
    currentCategory = Object.keys(DATA.extra_opts[opt].plots)[0];
    document.getElementById("searchBox").value = "";
    render();
}

function getCurrentData() {
    return DATA[currentMode][currentItem];
}

function getCategories() {
    if (currentMode === "sites") {
        return PRIOR_CATEGORIES;
    }

    return Object.keys(getCurrentData().plots).map(k => ({key: k, label: k}));
}

function renderTabs() {
    const tabs = document.getElementById("tabs");
    tabs.innerHTML = "";

    for (const catObj of getCategories()) {
        const cat = catObj.key;
        const label = catObj.label;
        const n = getCurrentData().plots[cat] ? getCurrentData().plots[cat].length : 0;

        const btn = document.createElement("button");
        btn.className = "tab" + (cat === currentCategory ? " active" : "");
        btn.innerText = `${label} (${n})`;
        btn.onclick = () => {
            currentCategory = cat;
            render();
        };
        tabs.appendChild(btn);
    }
}

function renderButtons() {
    for (const site of Object.keys(DATA.sites)) {
        const btn = document.getElementById("btn-sites-" + site);
        if (!btn) continue;
        btn.className = "site-button" + (currentMode === "sites" && site === currentItem ? " active" : "");
    }

    for (const opt of Object.keys(DATA.extra_opts)) {
        const btn = document.getElementById("btn-extra-" + opt);
        if (!btn) continue;
        btn.className = "site-button extra-button" + (currentMode === "extra_opts" && opt === currentItem ? " active" : "");
    }
}

function renderPlots() {
    const container = document.getElementById("plots");
    const search = document.getElementById("searchBox").value.toLowerCase().trim();

    let plots = getCurrentData().plots[currentCategory] || [];

    if (search) {
        plots = plots.filter(p => p.name.toLowerCase().includes(search));
    }

    if (!plots.length) {
        container.innerHTML = `<div class="empty">No plots found.</div>`;
        return;
    }

    let html = `<div class="grid">`;

    for (const p of plots) {
        html += `
            <div class="card">
                <img src="${p.src}" onclick="openModal('${p.src}')">
                <div class="caption">${p.name}</div>
            </div>
        `;
    }

    html += `</div>`;
    container.innerHTML = html;
}

function render() {
    const meta = getCurrentData();

    document.getElementById("siteTitle").innerText = meta.name;
    document.getElementById("siteSubtitle").innerText =
        currentMode === "sites"
        ? `${meta.folder} | lat ${meta.lat}, lon ${meta.lon}`
        : `Extra optimization folder: ${meta.folder}`;

    renderTabs();
    renderButtons();
    renderPlots();
}

function openModal(src) {
    document.getElementById("modalImg").src = src;
    document.getElementById("modal").classList.add("show");
}

function closeModal() {
    document.getElementById("modal").classList.remove("show");
}

initMap();
initButtons();
render();
</script>
